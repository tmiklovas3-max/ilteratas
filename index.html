<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Slot loterija</title>

<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
}

#slot {
  width: 300px;
  height: 80px;
  overflow: hidden;
  border: 4px solid gold;
  border-radius: 10px;
  background: black;
  position: relative;
}

#list {
  position: absolute;
  width: 100%;
}

.item {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="slot">
  <div id="list"></div>
</div>

<button onclick="spin()">Sukti</button>

<script>
// 👇 čia gali turėti 300+ vardų
const names = [
  "Jonas Jonaitis",
  "Petras Petraitis",
  "Ona Onaite",
  "Angelė Urbonaitė",
  "Tomas Kazlauskas",
  "Ieva Petrauskaitė",
  "Mantas Stankevičius"
];

// 🔁 padauginam sąrašą kad būtų ilgas scroll
const list = document.getElementById("list");

let bigList = [];
for (let i = 0; i < 20; i++) {
  bigList = bigList.concat(names);
}

// render
bigList.forEach(name => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerText = name;
  list.appendChild(div);
});

let position = 0;

function spin() {
  const target = "Angelė Urbonaitė";

  // randam target indeksą originaliam sąraše
  const targetIndex = names.indexOf(target);

  // pasirenkam kažkurią kopiją sąraše (kad atrodytų random)
  const cycles = 15;
  const finalIndex = targetIndex + (names.length * cycles);

  const itemHeight = 80;
  const finalPosition = finalIndex * itemHeight;

  let start = null;
  const duration = 4000;

  function animate(t) {
    if (!start) start = t;

    let progress = (t - start) / duration;
    if (progress > 1) progress = 1;

    // easing
    let ease = 1 - Math.pow(1 - progress, 3);

    position = finalPosition * ease;

    list.style.transform = `translateY(-${position}px)`;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      alert("Laimėjo: " + target);
    }
  }

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
