<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Slot loterija</title>

<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
}

#slot {
  width: 300px;
  height: 80px;
  overflow: hidden;
  border: 4px solid gold;
  border-radius: 10px;
  background: black;
  position: relative;
}

#slot::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border-top: 2px solid gold;
  border-bottom: 2px solid gold;
  pointer-events: none;
}

#list {
  position: absolute;
  width: 100%;
}

.item {
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #ccc;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="slot">
  <div id="list"></div>
</div>

<button onclick="spin()">Sukti</button>

<script>
// 👇 čia gali turėti 300+ vardų
const names = [
  "Jonas Jonaitis",
  "Petras Petraitis",
  "Ona Onaite",
  "Angelė Urbonaitė",
  "Tomas Kazlauskas",
  "Ieva Petrauskaitė",
  "Mantas Stankevičius"
];

const list = document.getElementById("list");

// 🔁 padarom ilgą sąrašą (kad suktųsi gražiai)
let bigList = [];
for (let i = 0; i < 30; i++) {
  bigList = bigList.concat(names);
}

// render
bigList.forEach(name => {
  const div = document.createElement("div");
  div.className = "item";
  div.innerText = name;
  list.appendChild(div);
});

function spin() {
  const target = "Angelė Urbonaitė";

  const targetIndex = names.indexOf(target);

  const cycles = 25; // kiek kartų "apsisuka"
  const finalIndex = targetIndex + (names.length * cycles);

  const itemHeight = 80;
  const finalPosition = finalIndex * itemHeight;

  let start = null;
  const duration = 6500; // ilgis (ms)

  function animate(t) {
    if (!start) start = t;

    let progress = (t - start) / duration;
    if (progress > 1) progress = 1;

    let ease = 1 - Math.pow(1 - progress, 4);

    const position = finalPosition * ease;

    list.style.transform = `translateY(-${position}px)`;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      highlightWinner(position);
    }
  }

  requestAnimationFrame(animate);
}

function highlightWinner(position) {
  const itemHeight = 80;
  const items = document.querySelectorAll(".item");

  items.forEach(el => {
    el.style.color = "#777";
    el.style.fontWeight = "normal";
    el.style.fontSize = "22px";
  });

  const index = Math.round(position / itemHeight);

  if (items[index]) {
    items[index].style.color = "gold";
    items[index].style.fontWeight = "bold";
    items[index].style.fontSize = "28px";
  }
}
</script>

</body>
</html>
