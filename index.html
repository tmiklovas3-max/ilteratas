<title>Laimės ratas</title>
<style>
  #names {
    width: 400px;

    border: 2px solid #333;
    margin: 20px auto;
    position: relative;
  }
  .name {
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;

    display: block;

    font-size: 20px;

  #winner {

    margin-top: 20px;
    font-size: 24px;
    font-weight: bold;
  }

</head>
